name: test
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pytest-cov ruff
      - name: lint
        run: ruff check .
      - name: test
        run: pytest -v --cov=azl_core --cov=azl_space --cov=azl_overlay --cov-report=term-missing
